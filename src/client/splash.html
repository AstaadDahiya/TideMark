<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <title>Tidemark</title>
  </head>
  <body class="app">
    <div class="ocean-bg">
      <div class="wave wave1"></div>
      <div class="wave wave2"></div>
      <div class="wave wave3"></div>
    </div>
    <div class="content">
      <div class="bottle-icon">🍾</div>
      <h1 class="title" id="title">Tidemark</h1>
      <p class="tagline">A bottle drifts between strangers.</p>
      <p class="subtitle" id="subtitle">Each one carries a story of where it's been.</p>
    </div>
    <div class="cta">
      <button class="start-button" id="start-button">Open the Ocean</button>
    </div>
    <footer class="footer">
      <span class="lighthouse-status" id="lighthouse-status">🏠 Lighthouse loading...</span>
    </footer>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
